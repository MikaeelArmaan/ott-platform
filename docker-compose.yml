version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ott_app
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis
  vite:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ott_vite
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    depends_on:
      - app
  nginx:
    image: nginx:alpine
    container_name: ott_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: ott_db
    restart: always
    environment:
      MYSQL_DATABASE: ott_platform
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: ott_redis
    ports:
      - "6379:6379"

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ott_queue
    command: php artisan queue:work
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - redis
  
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ott_scheduler
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    volumes:
      - ./:/var/www

volumes:
  db_data: